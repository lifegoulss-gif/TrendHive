app = "uniboxai-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  # Build context is the monorepo root — run `fly deploy` from repo root
  # fly deploy --config apps/whatsapp-worker/fly.toml

[env]
  NODE_ENV = "production"
  HEALTH_PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
